services:
  kouku-kinou:
    build:
      context: .
    container_name: kouku-kinou
    environment:
      KOUKU_KINOU_DB: /data/records.db
      KOUKU_KINOU_AUTH_MODE: ${KOUKU_KINOU_AUTH_MODE:-tailscale-or-password}
      KOUKU_KINOU_PASSWORD: ${KOUKU_KINOU_PASSWORD}
      KOUKU_KINOU_SESSION_TTL_MINUTES: ${KOUKU_KINOU_SESSION_TTL_MINUTES:-480}
      KOUKU_KINOU_SECURE_COOKIE: ${KOUKU_KINOU_SECURE_COOKIE:-1}
      KOUKU_KINOU_ALLOWED_NETWORKS: ${KOUKU_KINOU_ALLOWED_NETWORKS:-}
      KOUKU_KINOU_TRUST_PROXY: ${KOUKU_KINOU_TRUST_PROXY:-0}
    ports:
      - "127.0.0.1:8010:8010"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8010/api/health', timeout=5)); sys.exit(0 if data.get('status') == 'ok' else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./data:/data
      - ./index.html:/app/index.html:ro
      - ./README.html:/app/README.html:ro
      - ./README.md:/app/README.md:ro
      - ./DEPLOY_SYNOLOGY_JA.md:/app/DEPLOY_SYNOLOGY_JA.md:ro
      - ./OPERATIONS_MANUAL_JA.md:/app/OPERATIONS_MANUAL_JA.md:ro
      - ./TAILSCALE_CLIENT_GUIDE_JA.md:/app/TAILSCALE_CLIENT_GUIDE_JA.md:ro
      - ./TAILSCALE_TABLET_GUIDE_JA.md:/app/TAILSCALE_TABLET_GUIDE_JA.md:ro
      - ./TAILSCALE_TABLET_MESSAGE_TEMPLATE_JA.md:/app/TAILSCALE_TABLET_MESSAGE_TEMPLATE_JA.md:ro
      - ./TAILSCALE_TABLET_QR_SHEET_JA.md:/app/TAILSCALE_TABLET_QR_SHEET_JA.md:ro
      - ./TailscaleClientLauncher.cmd:/app/TailscaleClientLauncher.cmd:ro
      - ./TailscaleClientLauncher.ps1:/app/TailscaleClientLauncher.ps1:ro
      - ./TailscaleClientLauncher.settings.json:/app/TailscaleClientLauncher.settings.json:ro
      - ./.env.example:/app/.env.example:ro
      - ./assets:/app/assets:ro