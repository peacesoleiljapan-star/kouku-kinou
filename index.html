リをクリアしますか？\",\"5pFoH6SNFL\":\"この設定は後でConnectorsで変更できます。\",\"5pL4HtrvlI\":\"拡張機能をグローバルブロックリストに追加しました\",\"5px1rJwipu\":\".MCPBまたは.DXTファイルをここにドラッグしてインストールしてください\",\"5q3qC0sC3r\":\"ダウンロード\",\"5q4xKFLITN\":\"メールを再送信する\",\"5q8WUtVePQ\":\"医療コンプライアンス要件の複雑な体系を整理します\",\"5qKeNV67+8\":\"{hostname}から取得しています\",\"5qSBCRy+Vo\":\"スケジュールタスクの削除に失敗しました。再試行できます。\",\"5qU4fLT5uZ\":\"（{count}シート）\",\"5qaD7sDVxu\":\"拒否されました\",\"5qv0s2l7Fq\":\"チャットメモリはカスタマイズに移動しました。新しいカスタマイズページにアクセスして、メモリと設定を管理してください。\",\"5r4OWMGo0M\":\"このプロジェクトでこの選択を記憶する\",\"5sN4LcETWC\":\"プロジェクトのアーカイブを解除しますか？\",\"5sg7KCrrLg\":\"パスワード\",\"5t26NHik7t\":\"Webhookが設定されています。デフォルトブランチへのプッシュで自動同期がトリガーされます。\",\"5t4F/crY9k\":\"ベンダー評価の作成\",\"5tDaRyw6En\":\"アイデンティティプロバイダーとSCIM設定を使用して、シート階層とロールを管理します。\",\"5tRAuU0IyT\":\"プラグインを追加...\",\"5tVLXRUZrl\":\"Caps Lock\",\"5tXPeP/Nv3\":\"Bashモードです。チャットに戻るにはEscapeキーを押してください。\",\"5ti35ra0Bx\":\"最近のユーザー\",\"5u/aNLzaYk\":\"SSH ポート\",\"5v0WkZLzRG\":\"ブランチ\",\"5v6Yt2rarw\":\"{count}名のメンバーのカスタム制限を削除しますか？\",\"5v8aG9JiSc\":\"最初の{n}シートは14日間無料です。クレジットカードが必要です。\",\"5vCDyNa0t7\":\"チームメンバーがローカルのGitHub認証情報を使用して、Claude CodeのWebセッションを起動できるようにします。\",\"5wT8JS5ItI\":\"ClawdDashミニゲーム\",\"5wcUmrQQ68\":\"スキャンを共有\",\"5wnxO312Dk\":\" — 有効\",\"5xevYHjfY9\":\"右矢印キーを押す\",\"5y2qWOlFVf\":\"接続中...\",\"5y5jlij80c\":\"Canvas連携を有効にする\",\"5yCBRk9i5t\":\"コネクタへのアクセスを許可\",\"5yMs3LKpk2\":\"下書きのフィードバックを得る\",\"5yP9PZDr3c\":\"1つのオプションを選択\",\"5yZ7W0lqSf\":\".mdファイルとして保存\",\"5zROg8etNC\":\"Enterpriseへのアップグレードに失敗しました。\",\"5zZ44MiUDg\":\"画像の処理に失敗しました。もう一度お試しください。\",\"5zgvJww0Wl\":\"新規メンバーを追加\",\"6+10S68bv1\":\"お客様の許可をいただければ、チャットやコーディングセッションを使用してAIモデルの訓練と改善を行います。これにより、1) AIモデルを改善してClaudeをすべての人にとってより有用で正確なものにし、2) 有害な出力に対するより堅牢な安全対策を開発することができます。\",\"6+OlxJHHQg\":\"夜更かしですね、{name}さん\",\"6+vC7mqOdy\":\"セッションを初期化しました\",\"6/5xihDbh3\":\"個人プロジェクトを作成\",\"6/j3TwB/fF\":\"スキルファイルを読み込めませんでした\",\"604ZbY50uJ\":\"市場調査の計画\",\"60YXvmzIxf\":\"プロバイダー\",\"60n0LTOUYl\":\"その他のコマンドのデフォルト\",\"60vnqr5iW+\":\"拡張機能を許可\",\"61A5zwTvV2\":\"{name}さんの設定\",\"61IBOSf41U\":\ ;\n  }\n  .header-top .badge {\n    background: var(--accent);\n    color: #1a1a1a;\n    font-size: 10px;\n    padding: 2px 8px;\n    border-radius: 20px;\n    font-weight: 700;\n  }\n\n  /* TABS */\n  .tab-bar {\n    display: flex;\n    background: var(--primary);\n  }\n  .tab-btn {\n    flex: 1;\n    padding: 10px 8px;\n    border: none;\n    background: transparent;\n    color: rgba(255,255,255,0.6);\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 13px;\n    cursor: pointer;\n    border-bottom: 3px solid transparent;\n    transition: all 0.2s;\n    font-weight: 500;\n  }\n  .tab-btn.active {\n    color: white;\n    border-bottom-color: var(--accent);\n    background: rgba(255,255,255,0.08);\n  }\n\n  /* CONTENT */\n  .tab-content { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }\n  .tab-content.active { display: block; }\n\n  /* CARDS */\n  .card {\n    background: var(--card);\n    border-radius: 12px;\n    padding: 20px;\n    margin-bottom: 16px;\n    box-shadow: 0 2px 8px rgba(0,0,0,0.06);\n    border: 1px solid var(--border);\n  }\n  .card-header {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 16px;\n    padding-bottom: 12px;\n    border-bottom: 2px solid var(--section-bg);\n  }\n  .card-header .icon {\n    width: 36px; height: 36px;\n    border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 18px;\n  }\n  .card-header h2 {\n    font-family: 'Noto Serif JP', serif;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--primary);\n  }\n  .card-header .subtitle {\n    font-size: 12px;\n    color: var(--text-light);\n  }\n\n  /* FORM ELEMENTS */\n  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }\n  .form-group { display: flex; flex-direction: column; gap: 4px; }\n  .form-group.full { grid-column: 1 / -1; }\n  label {\n    font-size: 12px;\n    font-weight: 700;\n    color: var(--text-light);\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n  }\n  input[type=\"text\"], input[type=\"number\"], input[type=\"date\"], select, textarea {\n    border: 1.5px solid var(--border);\n    border-radius: 8px;\n    padding: 10px 12px;\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 14px;\n    color: var(--text);\n    background: #fafcff;\n    transition: border-color 0.2s, box-shadow 0.2s;\n    width: 100%;\n  }\n  input:focus, select:focus, textarea:focus {\n    outline: none;\n    border-color: var(--primary-light);\n    box-shadow: 0 0 0 3px rgba(45,106,159,0.12);\n  }\n  textarea { resize: vertical; min-height: 80px; }\n\n  /* RADIO / CHECKBOX GROUPS */\n  .radio-group { display: flex; flex-direction: column; gap: 6px; }\n  .radio-option {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 12px;\n    border-radius: 8px;\n    border: 1.5px solid var(--border);\n    cursor: pointer;\n    transition: all 0.2s;\n    background: #fafcff;\n  }\n  .radio-option:hover { border-color: var(--primary-light); background: var(--section-bg); }\n  .radio-option input[type=\"radio\"] { accent-color: var(--primary); width: 16px; height: 16px; }\n  .radio-option.selected { border-color: var(--primary-light); background: #e8f0f8; }\n  .radio-option .score-badge {\n    margin-left: auto;\n    background: var(--primary);\n    color: white;\n    font-size: 11px;\n    padding: 2px 8px;\n    border-radius: 12px;\n    font-weight: 700;\n  }\n\n  /* SECTION LABELS */\n  .section-label {\n    font-size: 13px;\n    font-weight: 700;\n    color: var(--primary);\n    margin-bottom: 8px;\n    margin-top: 4px;\n    padding-left: 8px;\n    border-left: 3px solid var(--accent);\n  }\n\n  /* SCORE DISPLAY */\n  .score-display {\n    text-align: center;\n    padding: 20px;\n    border-radius: 12px;\n    margin-top: 8px;\n  }\n  .score-number {\n    font-size: 48px;\n    font-weight: 700;\n    font-family: 'Noto Serif JP', serif;\n    line-height: 1;\n  }\n  .score-label { font-size: 14px; margin-top: 4px; font-weight: 500; }\n  .score-good { background: #e8f5f0; color: var(--success); }\n  .score-risk { background: #fff8e8; color: var(--warning); }\n  .score-bad { background: #fdf0ee; color: var(--danger); }\n  .score-neutral { background: var(--section-bg); color: var(--text); }\n\n  /* BUTTONS */\n  .btn {\n    padding: 11px 20px;\n    border-radius: 8px;\n    border: none;\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 14px;\n    font-weight: 700;\n    cursor: pointer;\n    transition: all 0.2s;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .btn-primary { background: var(--primary); color: white; }\n  .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); }\n  .btn-success { background: var(--success); color: white; }\n  .btn-success:hover { opacity: 0.9; transform: translateY(-1px); }\n  .btn-accent { background: var(--accent); color: #1a1a1a; }\n  .btn-accent:hover { background: var(--accent-light); transform: translateY(-1px); }\n  .btn-outline {\n    background: transparent;\n    border: 1.5px solid var(--primary);\n    color: var(--primary);\n  }\n  .btn-outline:hover { background: var(--section-bg); }\n  .btn-danger { background: var(--danger); color: white; }\n  .btn-sm { padding: 6px 14px; font-size: 12px; }\n\n  .action-bar {\n    display: flex;\n    gap: 10px;\n    flex-wrap: wrap;\n    margin-top: 16px;\n  }\n\n  /* HISTORY TABLE */\n  .history-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 13px;\n  }\n  .history-table th {\n    background: var(--primary);\n    color: white;\n    padding: 10px 12px;\n    text-align: left;\n    font-weight: 600;\n  }\n  .history-table td {\n    padding: 10px 12px;\n    border-bottom: 1px solid var(--border);\n    vertical-align: middle;\n  }\n  .history-table tr:hover td { background: var(--section-bg); }\n  .history-table .tag {\n    font-size: 11px;\n    padding: 2px 8px;\n    border-radius: 12px;\n    font-weight: 700;\n    display: inline-block;\n  }\n  .tag-good { background: #d4edda; color: var(--success); }\n  .tag-risk { background: #fff3cd; color: var(--warning); }\n  .tag-bad { background: #f8d7da; color: var(--danger); }\n\n  /* SEPARATOR */\n  .divider {\n    height: 1px;\n    background: var(--border);\n    margin: 16px 0;\n  }\n\n  /* INLINE SCORE PREVIEW */\n  .mini-score {\n    display: inline-block;\n    background: var(--section-bg);\n    border-radius: 8px;\n    padding: 8px 16px;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--primary);\n    margin-top: 8px;\n  }\n\n  /* PRINT */\n  @media print {\n    .app-header, .tab-bar, .action-bar, .no-print { display: none !important; }\n    .tab-content { display: block !important; padding: 0; }\n    .card { box-shadow: none; break-inside: avoid; }\n    body { font-size: 12px; background: white; }\n  }\n\n  /* RESPONSIVE */\n  @media (max-width: 600px) {\n    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }\n    .header-top h1 { font-size: 15px; }\n  }\n\n  /* NOTIFICATION */\n  .toast {\n    position: fixed;\n    bottom: 24px;\n    left: 50%;\n    transform: translateX(-50%) translateY(100px);\n    background: #1a2a3a;\n    color: white;\n    padding: 12px 24px;\n    border-radius: 24px;\n    font-size: 14px;\n    font-weight: 500;\n    z-index: 9999;\n    transition: transform 0.3s ease;\n    white-space: nowrap;\n  }\n  .toast.show { transform: translateX(-50%) translateY(0); }\n\n  .empty-state {\n    text-align: center;\n    padding: 40px;\n    color: var(--text-light);\n    font-size: 14px;\n  }\n  .empty-state .icon { font-size: 40px; margin-bottom: 8px; }\n\n  .info-box {\n    background: var(--section-bg);\n    border-left: 4px solid var(--primary-light);\n    border-radius: 0 8px 8px 0;\n    padding: 10px 14px;\n    font-size: 13px;\n    color: var(--text-light);\n    margin-bottom: 12px;\n  }\n\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\n\u003cdiv class=\"app-header\"\u003e\n  \u003cdiv class=\"header-top\"\u003e\n    \u003ch1\u003e🦷 口腔機能・栄養評価システム\u003c/h1\u003e\n    \u003cspan class=\"badge\"\u003eVer 1.0\u003c/span\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"tab-bar\"\u003e\n    \u003cbutton class=\"tab-btn active\" onclick=\"showTab('patient')\"\u003e👤 利用者情報\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('oral')\"\u003e🦷 口腔機能\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('mna')\"\u003e🥗 MNA-SF\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('summary')\"\u003e📊 総合評価\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('history')\"\u003e📋 記録一覧\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 1: 利用者情報 ==================== --\u003e\n\u003cdiv id=\"tab-patient\" class=\"tab-content active\"\u003e\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#eef4fa\"\u003e👤\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e利用者基本情報\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003eBasic Patient Information\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eふりがな\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"furigana\" placeholder=\"やまだ たろう\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e氏名\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"name\" placeholder=\"山田 太郎\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e性別\u003c/label\u003e\n        \u003cselect id=\"gender\"\u003e\n          \u003coption value=\"\"\u003e選択\u003c/option\u003e\n          \u003coption value=\"男\"\u003e男\u003c/option\u003e\n          \u003coption value=\"女\"\u003e女\u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e生年月日（西暦）\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"birthdate\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e体重 (kg)\u003c/label\u003e\n        \u003cinput type=\"number\" id=\"weight\" step=\"0.1\" placeholder=\"55.0\" oninput=\"calcBMI()\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e身長 (cm)\u003c/label\u003e\n        \u003cinput type=\"number\" id=\"height\" step=\"0.1\" placeholder=\"160.0\" oninput=\"calcBMI()\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eBMI（自動計算）\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"bmi\" readonly style=\"background:#f0f4f8;font-weight:700;\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e評価日\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"evalDate\"\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eサービスの訪問開始日\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"serviceStart\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eサービスの訪問終了日\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"serviceEnd\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eかかりつけ歯科医\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"dentist\" placeholder=\"○○歯科クリニック\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e入れ歯の使用\u003c/label\u003e\n        \u003cselect id=\"denture\"\u003e\n          \u003coption value=\"\"\u003e選択\u003c/option\u003e\n          \u003coption value=\"あり\"\u003eあり\u003c/option\u003e\n          \u003coption value=\"なし\"\u003eなし\u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group full\"\u003e\n        \u003clabel\u003e担当者名\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"staff\" placeholder=\"担当スタッフ名\"\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"action-bar no-print\"\u003e\n      \u003cbutton class=\"btn btn-primary\" onclick=\"showTab('oral')\"\u003e次へ：口腔機能評価 →\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 2: 口腔機能 ==================== --\u003e\n\u003cdiv id=\"tab-oral\" class=\"tab-content\"\u003e\n\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#eef4fa\"\u003e📋\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e1. 質問と観察（別紙1）\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003e問診項目・観察項目\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"info-box\"\u003e実施期間中にくまなく1回記入。評価項目に沿って回答してください。\u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e① 問診項目\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e① 硬いものは食べにくいですか\u003c/label\u003e\n      \u003cselect id=\"q1\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.いいえ\u003c/option\u003e\u003coption\u003e2.はい\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e② お茶や汁物でむせることがありますか\u003c/label\u003e\n      \u003cselect id=\"q2\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.いいえ\u003c/option\u003e\u003coption\u003e2.はい\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e③ 口が渇きやすいですか\u003c/label\u003e\n      \u003cselect id=\"q3\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.いいえ\u003c/option\u003e\u003coption\u003e2.はい\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n\n    \u003cp class=\"section-label\" style=\"margin-top:14px\"\u003e② 観察項目\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e自分の歯または入れ歯で左右の奥歯をしっかりかみしめられますか\u003c/label\u003e\n      \u003cselect id=\"q4\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.面方でできる\u003c/option\u003e\u003coption\u003e2.片方だけできる\u003c/option\u003e\u003coption\u003e3.どちらもできない\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e全体的にみて、過去1ヶ月間の健康状態はいかがですか\u003c/label\u003e\n      \u003cselect id=\"q5\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.最高に良い\u003c/option\u003e\u003coption\u003e2.とても良い\u003c/option\u003e\u003coption\u003e3.良い\u003c/option\u003e\u003coption\u003e4.あまり良くない\u003c/option\u003e\u003coption\u003e5.良くない\u003c/option\u003e\u003coption\u003e6.ぜんぜん良くない\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003eお口の健康状態はいかがですか\u003c/label\u003e\n      \u003cselect id=\"q6\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.よい\u003c/option\u003e\u003coption\u003e2.やや良い\u003c/option\u003e\u003coption\u003e3.ふつう\u003c/option\u003e\u003coption\u003e4.やや悪い\u003c/option\u003e\u003coption\u003e5.悪い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e口臭\u003c/label\u003e\n      \u003cselect id=\"q7\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.ない\u003c/option\u003e\u003coption\u003e2.強い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e日常的な口腔清掃習慣\u003c/label\u003e\n      \u003cselect id=\"q8\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.ない\u003c/option\u003e\u003coption\u003e2.多少ある\u003c/option\u003e\u003coption\u003e3.多い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003eむせ\u003c/label\u003e\n      \u003cselect id=\"q9\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.最高に良い\u003c/option\u003e\u003coption\u003e2.多少ある\u003c/option\u003e\u003coption\u003e2.やや多い\u003c/option\u003e\u003coption\u003e3.多い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e食事中の食べこぼし\u003c/label\u003e\n      \u003cselect id=\"q10\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1.最高\u003c/option\u003e\u003coption\u003e2.やや重篤\u003c/option\u003e\u003coption\u003e3.ふつう\u003c/option\u003e\u003coption\u003e4.やや良い\u003c/option\u003e\u003coption\u003e5.乏しい\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003clabel\u003e特記事項\u003c/label\u003e\n      \u003ctextarea id=\"oral_note1\" placeholder=\"特記事項があれば記入してください\"\u003e\u003c/textarea\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#eef4fa\"\u003e🔬\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e2. 専門職によるアセスメント・モニタリング\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003e課題把握の確認（別紙1・第2部）\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e① 右側の咬合の確認（収縮）\u003c/p\u003e\n    \u003cdiv class=\"form-grid\" style=\"margin-bottom:10px\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e右側・咬合の収縮の確認\u003c/label\u003e\n        \u003cselect id=\"a1\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1強い\u003c/option\u003e\u003coption\u003e2強い\u003c/option\u003e\u003coption\u003e3無し\u003c/option\u003e\u003coption\u003e3多い\u003c/option\u003e\u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e左側・咬合の収縮の確認\u003c/label\u003e\n        \u003cselect id=\"a2\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1強い\u003c/option\u003e\u003coption\u003e2強い\u003c/option\u003e\u003coption\u003e3無し\u003c/option\u003e\u003coption\u003e3多い\u003c/option\u003e\u003c/select\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e② 舌や頬粘膜のようす\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003cselect id=\"a3\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1ない\u003c/option\u003e\u003coption\u003e2ある\u003c/option\u003e\u003coption\u003e3多い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e③ 舌の動きのようす\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n      \u003cselect id=\"a4\"\u003e\u003coption value=\"\"\u003e選択\u003c/option\u003e\u003coption\u003e1ない\u003c/option\u003e\u003coption\u003e2ある\u003c/option\u003e\u003coption\u003e3多い\u003c/option\u003e\u003c/select\u003e\n    \u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e④ RSST（反復唾液嚥下テスト）\u003c/p\u003e\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e構築時間（秒）\u003c/label\u003e\n        \u003cinput type=\"number\" id=\"rsst_time\" placeholder=\"3 ype=\"radio\" name=\"mna_b\" value=\"1\"\u003e わからない\n        \u003cspan class=\"score-badge\"\u003e1点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('b',2,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_b\" value=\"2\"\u003e 1〜3kgの減少\n        \u003cspan class=\"score-badge\"\u003e2点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('b',3,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_b\" value=\"3\"\u003e 体重減少なし\n        \u003cspan class=\"score-badge\"\u003e3点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003c!-- Q C --\u003e\n    \u003cp class=\"section-label\"\u003eC 自力歩行\u003c/p\u003e\n    \u003cdiv class=\"radio-group\" id=\"mna_c_group\"\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('c',0,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_c\" value=\"0\"\u003e 寝たきりまたは車椅子を常時使用\n        \u003cspan class=\"score-badge\"\u003e0点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('c',1,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_c\" value=\"1\"\u003e ベッドや車椅子を離れられるが、歩いて外出はできない\n        \u003cspan class=\"score-badge\"\u003e1点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('c',2,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_c\" value=\"2\"\u003e 自由に歩いて外出できる\n        \u003cspan class=\"score-badge\"\u003e2点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003c!-- Q D --\u003e\n    \u003cp class=\"section-label\"\u003eD 精神的ストレス・急性疾患（過去3ヶ月間）\u003c/p\u003e\n    \u003cdiv class=\"radio-group\" id=\"mna_d_group\"\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('d',0,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_d\" value=\"0\"\u003e はい\n        \u003cspan class=\"score-badge\"\u003e0点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('d',2,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_d\" value=\"2\"\u003e いいえ\n        \u003cspan class=\"score-badge\"\u003e2点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003c!-- Q E --\u003e\n    \u003cp class=\"section-label\"\u003eE 神経・精神的問題\u003c/p\u003e\n    \u003cdiv class=\"radio-group\" id=\"mna_e_group\"\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('e',0,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_e\" value=\"0\"\u003e 強度認知症またはうつ状態\n        \u003cspan class=\"score-badge\"\u003e0点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('e',1,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_e\" value=\"1\"\u003e 中程度の認知症\n        \u003cspan class=\"score-badge\"\u003e1点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('e',2,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_e\" value=\"2\"\u003e 精神的問題なし\n        \u003cspan class=\"score-badge\"\u003e2点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003c!-- Q F1 / F2 --\u003e\n    \u003cp class=\"section-label\"\u003eF BMI または ふくらはぎ周囲長\u003c/p\u003e\n    \u003cdiv class=\"info-box\"\u003eBMIが測定できる場合はF1、できない場合はF2に回答してください。\u003c/div\u003e\n\n    \u003cp style=\"font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px\"\u003eF1 BMI（体重÷身長²）\u003c/p\u003e\n    \u003cdiv class=\"radio-group\" id=\"mna_f1_group\"\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f1',0,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"0\"\u003e BMIが19未満\n        \u003cspan class=\"score-badge\"\u003e0点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f1',1,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"1\"\u003e BMIが19以上、21未満\n        \u003cspan class=\"score-badge\"\u003e1点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f1',2,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"2\"\u003e BMIが21以上、23未満\n        \u003cspan class=\"score-badge\"\u003e2点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f1',3,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"3\"\u003e BMIが23以上\n        \u003cspan class=\"score-badge\"\u003e3点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cp style=\"font-size:13px;font-weight:700;color:var(--mna-color);margin:12px 0 8px\"\u003eF2 ふくらはぎ周囲長（CC）\u003c/p\u003e\n    \u003cdiv class=\"radio-group\" id=\"mna_f2_group\"\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f2',0,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"0\"\u003e 31cm未満\n        \u003cspan class=\"score-badge\"\u003e0点\u003c/span\u003e\n      \u003c/label\u003e\n      \u003clabel class=\"radio-option\" onclick=\"selectMNA('f2',3,this)\"\u003e\n        \u003cinput type=\"radio\" name=\"mna_f\" value=\"3\"\u003e 31cm以上\n        \u003cspan class=\"score-badge\"\u003e3点\u003c/span\u003e\n      \u003c/label\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003c!-- SCORE --\u003e\n    \u003cp class=\"section-label\"\u003eスクリーニングスコア（自動計算）\u003c/p\u003e\n    \u003cdiv id=\"mna_score_display\" class=\"score-display score-neutral\"\u003e\n      \u003cdiv class=\"score-number\" id=\"mna_score_num\"\u003e―\u003c/div\u003e\n      \u003cdiv class=\"score-label\" id=\"mna_score_label\"\u003e/ 14 ポイント\u003c/div\u003e\n      \u003cdiv style=\"margin-top:8px;font-size:14px;font-weight:700\" id=\"mna_score_result\"\u003e回答を選択してください\u003c/div\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"action-bar no-print\"\u003e\n    \u003cbutton class=\"btn btn-primary\" onclick=\"showTab('summary')\"\u003e次へ：総合評価 →\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 4: 総合評価 ==================== --\u003e\n\u003cdiv id=\"tab-summary\" class=\"tab-content\"\u003e\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#fff8e8\"\u003e📊\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e総合評価サマリー\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003e口腔機能 + 栄養状態\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdiv id=\"summary_name\" style=\"font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px\"\u003e―\u003c/div\u003e\n    \u003cdiv id=\"summary_date\" style=\"font-size:13px;color:var(--text-light);margin-bottom:16px\"\u003e評価日：―\u003c/div\u003e\n\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"section-label\"\u003e🦷 口腔機能評価\u003c/p\u003e\n        \u003cdiv id=\"oral_summary_box\" class=\"score-display score-neutral\" style=\"padding:16px\"\u003e\n          \u003cdiv style=\"font-size:14px;font-weight:500\" id=\"oral_summary_text\"\u003e口腔機能タブを入力してください\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"section-label\"\u003e🥗 MNA-SF スコア\u003c/p\u003e\n        \u003cdiv id=\"mna_summary_box\" class=\"score-display score-neutral\" style=\"padding:16px\"\u003e\n          \u003cdiv class=\"score-number\" id=\"mna_summary_num\"\u003e―\u003c/div\u003e\n          \u003cdiv id=\"mna_summary_result\" style=\"font-size:14px;font-weight:700;margin-top:4px\"\u003eMNAタブを入力してください\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003eコメント・指導内容\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:12px\"\u003e\n      \u003clabel\u003e支援の方向性・コメント\u003c/label\u003e\n      \u003ctextarea id=\"summary_comment\" placeholder=\"例：口腔清掃状態良好。MNAスコアにより低栄養のリスクあり。栄養士への連携を検討。\" style=\"min-height:100px\"\u003e\u003c/textarea\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\"\u003e\n      \u003clabel\u003e次回モニタリング予定日\u003c/label\u003e\n      \u003cinput type=\"date\" id=\"next_monitor\"\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"card no-print\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#fff8e8\"\u003e💾\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e保存・出力\u003c/h2\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"action-bar\"\u003e\n      \u003cbutton class=\"btn btn-success\" onclick=\"saveRecord()\"\u003e💾 記録を保存\u003c/button\u003e\n      \u003cbutton class=\"btn btn-accent\" onclick=\"printRecord()\"\u003e🖨️ 印刷 / PDF出力\u003c/button\u003e\n      \u003cbutton class=\"btn btn-outline\" onclick=\"clearAll()\"\u003e🔄 新規入力\u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 5: 記録一覧 ==================== --\u003e\n\u003cdiv id=\"tab-history\" class=\"tab-content\"\u003e\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#f0f4f8\"\u003e📋\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e保存済み記録一覧\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003eSaved Assessment Records\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"overflow-x:auto\"\u003e\n      \u003ctable class=\"history-table\" id=\"historyTable\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\n            \u003cth\u003e評価日\u003c/th\u003e\n            \u003cth\u003e氏名\u003c/th\u003e\n            \u003cth\u003eMNA Score\u003c/th\u003e\n            \u003cth\u003e栄養判定\u003c/th\u003e\n            \u003cth\u003e口腔継続\u003c/th\u003e\n            \u003cth\u003e操作\u003c/th\u003e\n          \u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody id=\"historyBody\"\u003e\n          \u003ctr\u003e\u003ctd colspan=\"6\"\u003e\u003cdiv class=\"empty-state\"\u003e\u003cdiv class=\"icon\"\u003e📂\u003c/div\u003e保存された記録はありません\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- TOAST --\u003e\n\u003cdiv class=\"toast\" id=\"toast\"\u003e\u003c/div\u003e\n\n\u003cscript\u003e\n// ==================== STATE ====================\nlet mnaScores = { a: null, b: null, c: null, d: null, e: null, f: null };\nlet records = JSON.parse(localStorage.getItem('oralNutritionRecords') || '[]');\n\n// ==================== TABS ====================\nfunction showTab(id) {\n  document.querySelectorAll('.tab-content').forEach(t =\u003e t.classList.remove('active'));\n  document.querySelectorAll('.tab-btn').forEach(b =\u003e b.classList.remove('active'));\n  document.getElementById('tab-' + id).classList.add('active');\n  document.querySelectorAll('.tab-btn').forEach((b, i) =\u003e {\n    const ids = ['patient','oral','mna','summary','history'];\n    if (ids[i] === id) b.classList.add('active');\n  });\n  if (id === 'summary') updateSummary();\n}\n\n// ==================== BMI ====================\nfunction calcBMI() {\n  const w = parseFloat(document.getElementById('weight').value);\n  const h = parseFloat(document.getElementById('height').value);\n  if (w \u0026\u0026 h \u0026\u0026 h \u003e 0) {\n    const bmi = (w / ((h / 100) ** 2)).toFixed(1);\n    document.getElementById('bmi').value = bmi;\n    // Auto-suggest F1\n    autoBMI(parseFloat(bmi));\n  } else {\n    document.getElementById('bmi').value = '';\n  }\n}\n\nfunction autoBMI(bmi) {\n  let score = 0;\n  if (bmi \u003c 19) score = 0;\n  else if (bmi \u003c 21) score = 1;\n  else if (bmi \u003c 23) score = 2;\n  else score = 3;\n  // visually pre-select\n}\n\n// ==================== MNA ====================\nfunction selectMNA(key, value, el) {\n  // Clear selection in group\n  const grpId = key === 'f2' ? 'mna_f1_group' : (key === 'f1' ? 'mna_f1_group' : 'mna_' + key + '_group');\n  if (key === 'f1' || key === 'f2') {\n    document.querySelectorAll('#mna_f1_group .radio-option, #mna_f2_group .radio-option').forEach(o =\u003e o.classList.remove('selected'));\n  } else {\n    document.querySelectorAll('#mna_' + key + '_group .radio-option').forEach(o =\u003e o.classList.remove('selected'));\n  }\n  el.classList.add('selected');\n  mnaScores[key === 'f2' ? 'f' : key] = value;\n  calcMNAScore();\n}\n\nfunction calcMNAScore() {\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  if (vals.some(v =\u003e v === null)) {\n    document.getElementById('mna_score_num').textContent = '―';\n    document.getElementById('mna_score_result').textContent = '全項目に回答してください';\n    return;\n  }\n  const total = vals.reduce((s, v) =\u003e s + v, 0);\n  const numEl = document.getElementById('mna_score_num');\n  const resEl = document.getElementById('mna_score_result');\n  const boxEl = document.getElementById('mna_score_display');\n  numEl.textContent = total;\n  boxEl.className = 'score-display';\n  if (total \u003e= 12) {\n    resEl.textContent = '✅ 栄養状態良好（12〜14点）';\n    boxEl.classList.add('score-good');\n  } else if (total \u003e= 8) {\n    resEl.textContent = '⚠️ 低栄養のおそれあり - At risk（8〜11点）';\n    boxEl.classList.add('score-risk');\n  } else {\n    resEl.textContent = '❌ 低栄養（0〜7点）';\n    boxEl.classList.add('score-bad');\n  }\n}\n\n// ==================== SUMMARY ====================\nfunction updateSummary() {\n  const name = document.getElementById('name').value || '―';\n  const date = document.getElementById('evalDate').value || '―';\n  document.getElementById('summary_name').textContent = name;\n  document.getElementById('summary_date').textContent = '評価日：' + date;\n\n  // Oral\n  const oral2 = document.getElementById('oral_eval2').value;\n  const oralBox = document.getElementById('oral_summary_box');\n  const oralText = document.getElementById('oral_summary_text');\n  oralBox.className = 'score-display';\n  if (oral2.includes('継続')) {\n    oralText.textContent = '継続が必要';\n    oralBox.classList.add('score-risk');\n  } else if (oral2.includes('終了')) {\n    oralText.textContent = 'サービス終了';\n    oralBox.classList.add('score-good');\n  } else {\n    oralText.textContent = '口腔機能タブを入力してください';\n    oralBox.classList.add('score-neutral');\n  }\n\n  // MNA\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  const mnaBox = document.getElementById('mna_summary_box');\n  const mnaNum = document.getElementById('mna_summary_num');\n  const mnaRes = document.getElementById('mna_summary_result');\n  mnaBox.className = 'score-display';\n  if (vals.some(v =\u003e v === null)) {\n    mnaNum.textContent = '―';\n    mnaRes.textContent = 'MNAタブを入力してください';\n    mnaBox.classList.add('score-neutral');\n  } else {\n    const total = vals.reduce((s, v) =\u003e s + v, 0);\n    mnaNum.textContent = total + ' / 14';\n    if (total \u003e= 12) { mnaRes.textContent = '✅ 栄養状態良好'; mnaBox.classList.add('score-good'); }\n    else if (total \u003e= 8) { mnaRes.textContent = '⚠️ 低栄養のおそれあり'; mnaBox.classList.add('score-risk'); }\n    else { mnaRes.textContent = '❌ 低栄養'; mnaBox.classList.add('score-bad'); }\n  }\n}\n\n// ==================== SAVE ====================\nfunction saveRecord() {\n  const name = document.getElementById('name').value;\n  if (!name) { showToast('⚠️ 氏名を入力してください'); return; }\n  const date = document.getElementById('evalDate').value || new Date().toISOString().split('T')[0];\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  const mnaTotal = vals.some(v =\u003e v === null) ? null : vals.reduce((s, v) =\u003e s + v, 0);\n  let mnaLabel = mnaTotal === null ? '―' : mnaTotal \u003e= 12 ? '良好' : mnaTotal \u003e= 8 ? 'At risk' : '低栄養';\n\n  const record = {\n    id: Date.now(),\n    date,\n    name,\n    furigana: document.getElementById('furigana').value,\n    mnaScore: mnaTotal,\n    mnaLabel,\n    oralContinue: document.getElementById('oral_eval2').value,\n    comment: document.getElementById('summary_comment').value,\n    nextMonitor: document.getElementById('next_monitor').value,\n    weight: document.getElementById('weight').value,\n    height: document.getElementById('height').value,\n    bmi: document.getElementById('bmi').value,\n    mnaScores: { ...mnaScores }\n  };\n\n  records.unshift(record);\n  localStorage.setItem('oralNutritionRecords', JSON.stringify(records));\n  renderHistory();\n  showToast('💾 記録を保存しました');\n}\n\n// ==================== HISTORY ====================\nfunction renderHistory() {\n  const tbody = document.getElementById('historyBody');\n  if (records.length === 0) {\n    tbody.innerHTML = '\u003ctr\u003e\u003ctd colspan=\"6\"\u003e\u003cdiv class=\"empty-state\"\u003e\u003cdiv class=\"icon\"\u003e📂\u003c/div\u003e保存された記録はありません\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e';\n    return;\n  }\n  tbody.innerHTML = records.map(r =\u003e {\n    const tagClass = r.mnaLabel === '良好' ? 'tag-good' : r.mnaLabel === 'At risk' ? 'tag-risk' : r.mnaLabel === '低栄養' ? 'tag-bad' : '';\n    const oralClass = r.oralContinue \u0026\u0026 r.oralContinue.includes('継続') ? 'tag-risk' : r.oralContinue \u0026\u0026 r.oralContinue.includes('終了') ? 'tag-good' : '';\n    return `\u003ctr\u003e\n      \u003ctd\u003e${r.date}\u003c/td\u003e\n      \u003ctd\u003e\u003cstrong\u003e${r.name}\u003c/strong\u003e\u003cbr\u003e\u003csmall style=\"color:var(--text-light)\"\u003e${r.furigana||''}\u003c/sma
