y);\n    color: white;\n    padding: 0;\n    position: sticky;\n    top: 0;\n    z-index: 100;\n    box-shadow: 0 2px 12px rgba(0,0,0,0.2);\n  }\n  .header-top {\n    display: flex;\n    align-items: center;\n    padding: 12px 20px;\n    gap: 16px;\n    border-bottom: 1px solid rgba(255,255,255,0.15);\n  }\n  .header-top h1 {\n    font-family: 'Noto Serif JP', serif;\n    font-size: 18px;\n    font-weight: 700;\n    flex: 1;\n    letter-spacing: 0.05em;\n  }\n  .header-top .badge {\n    background: var(--accent);\n    color: #1a1a1a;\n    font-size: 10px;\n    padding: 2px 8px;\n    border-radius: 20px;\n    font-weight: 700;\n  }\n\n  /* TABS */\n  .tab-bar {\n    display: flex;\n    background: var(--primary);\n  }\n  .tab-btn {\n    flex: 1;\n    padding: 10px 8px;\n    border: none;\n    background: transparent;\n    color: rgba(255,255,255,0.6);\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 13px;\n    cursor: pointer;\n    border-bottom: 3px solid transparent;\n    transition: all 0.2s;\n    font-weight: 500;\n  }\n  .tab-btn.active {\n    color: white;\n    border-bottom-color: var(--accent);\n    background: rgba(255,255,255,0.08);\n  }\n\n  /* CONTENT */\n  .tab-content { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }\n  .tab-content.active { display: block; }\n\n  /* CARDS */\n  .card {\n    background: var(--card);\n    border-radius: 12px;\n    padding: 20px;\n    margin-bottom: 16px;\n    box-shadow: 0 2px 8px rgba(0,0,0,0.06);\n    border: 1px solid var(--border);\n  }\n  .card-header {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 16px;\n    padding-bottom: 12px;\n    border-bottom: 2px solid var(--section-bg);\n  }\n  .card-header .icon {\n    width: 36px; height: 36px;\n    border-radius: 8px;\n    display: flex; align-items: center; justify-content: center;\n    font-size: 18px;\n  }\n  .card-header h2 {\n    font-family: 'Noto Serif JP', serif;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--primary);\n  }\n  .card-header .subtitle {\n    font-size: 12px;\n    color: var(--text-light);\n  }\n\n  /* FORM ELEMENTS */\n  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }\n  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }\n  .form-group { display: flex; flex-direction: column; gap: 4px; }\n  .form-group.full { grid-column: 1 / -1; }\n  label {\n    font-size: 12px;\n    font-weight: 700;\n    color: var(--text-light);\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n  }\n  input[type=\"text\"], input[type=\"number\"], input[type=\"date\"], select, textarea {\n    border: 1.5px solid var(--border);\n    border-radius: 8px;\n    padding: 10px 12px;\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 14px;\n    color: var(--text);\n    background: #fafcff;\n    transition: border-color 0.2s, box-shadow 0.2s;\n    width: 100%;\n  }\n  input:focus, select:focus, textarea:focus {\n    outline: none;\n    border-color: var(--primary-light);\n    box-shadow: 0 0 0 3px rgba(45,106,159,0.12);\n  }\n  textarea { resize: vertical; min-height: 80px; }\n\n  /* RADIO / CHECKBOX GROUPS */\n  .radio-group { display: flex; flex-direction: column; gap: 6px; }\n  .radio-option {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 12px;\n    border-radius: 8px;\n    border: 1.5px solid var(--border);\n    cursor: pointer;\n    transition: all 0.2s;\n    background: #fafcff;\n  }\n  .radio-option:hover { border-color: var(--primary-light); background: var(--section-bg); }\n  .radio-option input[type=\"radio\"] { accent-color: var(--primary); width: 16px; height: 16px; }\n  .radio-option.selected { border-color: var(--primary-light); background: #e8f0f8; }\n  .radio-option .score-badge {\n    margin-left: auto;\n    background: var(--primary);\n    color: white;\n    font-size: 11px;\n    padding: 2px 8px;\n    border-radius: 12px;\n    font-weight: 700;\n  }\n\n  /* SECTION LABELS */\n  .section-label {\n    font-size: 13px;\n    font-weight: 700;\n    color: var(--primary);\n    margin-bottom: 8px;\n    margin-top: 4px;\n    padding-left: 8px;\n    border-left: 3px solid var(--accent);\n  }\n\n  /* SCORE DISPLAY */\n  .score-display {\n    text-align: center;\n    padding: 20px;\n    border-radius: 12px;\n    margin-top: 8px;\n  }\n  .score-number {\n    font-size: 48px;\n    font-weight: 700;\n    font-family: 'Noto Serif JP', serif;\n    line-height: 1;\n  }\n  .score-label { font-size: 14px; margin-top: 4px; font-weight: 500; }\n  .score-good { background: #e8f5f0; color: var(--success); }\n  .score-risk { background: #fff8e8; color: var(--warning); }\n  .score-bad { background: #fdf0ee; color: var(--danger); }\n  .score-neutral { background: var(--section-bg); color: var(--text); }\n\n  /* BUTTONS */\n  .btn {\n    padding: 11px 20px;\n    border-radius: 8px;\n    border: none;\n    font-family: 'Noto Sans JP', sans-serif;\n    font-size: 14px;\n    font-weight: 700;\n    cursor: pointer;\n    transition: all 0.2s;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n  .btn-primary { background: var(--primary); color: white; }\n  .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); }\n  .btn-success { background: var(--success); color: white; }\n  .btn-success:hover { opacity: 0.9; transform: translateY(-1px); }\n  .btn-accent { background: var(--accent); color: #1a1a1a; }\n  .btn-accent:hover { background: var(--accent-light); transform: translateY(-1px); }\n  .btn-outline {\n    background: transparent;\n    border: 1.5px solid var(--primary);\n    color: var(--primary);\n  }\n  .btn-outline:hover { background: var(--section-bg); }\n  .btn-danger { background: var(--danger); color: white; }\n  .btn-sm { padding: 6px 14px; font-size: 12px; }\n\n  .action-bar {\n    display: flex;\n    gap: 10px;\n    flex-wrap: wrap;\n    margin-top: 16px;\n  }\n\n  /* HISTORY TABLE */\n  .history-table {\n    width: 100%;\n    border-collapse: collapse;\n    font-size: 13px;\n  }\n  .history-table th {\n    background: var(--primary);\n    color: white;\n    padding: 10px 12px;\n    text-align: left;\n    font-weight: 600;\n  }\n  .history-table td {\n    padding: 10px 12px;\n    border-bottom: 1px solid var(--border);\n    vertical-align: middle;\n  }\n  .history-table tr:hover td { background: var(--section-bg); }\n  .history-table .tag {\n    font-size: 11px;\n    padding: 2px 8px;\n    border-radius: 12px;\n    font-weight: 700;\n    display: inline-block;\n  }\n  .tag-good { background: #d4edda; color: var(--success); }\n  .tag-risk { background: #fff3cd; color: var(--warning); }\n  .tag-bad { background: #f8d7da; color: var(--danger); }\n\n  /* SEPARATOR */\n  .divider {\n    height: 1px;\n    background: var(--border);\n    margin: 16px 0;\n  }\n\n  /* INLINE SCORE PREVIEW */\n  .mini-score {\n    display: inline-block;\n    background: var(--section-bg);\n    border-radius: 8px;\n    padding: 8px 16px;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--primary);\n    margin-top: 8px;\n  }\n\n  /* PRINT */\n  @media print {\n    .app-header, .tab-bar, .action-bar, .no-print { display: none !important; }\n    .tab-content { display: block !important; padding: 0; }\n    .card { box-shadow: none; break-inside: avoid; }\n    body { font-size: 12px; background: white; }\n  }\n\n  /* RESPONSIVE */\n  @media (max-width: 600px) {\n    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }\n    .header-top h1 { font-size: 15px; }\n  }\n\n  /* NOTIFICATION */\n  .toast {\n    position: fixed;\n    bottom: 24px;\n    left: 50%;\n    transform: translateX(-50%) translateY(100px);\n    background: #1a2a3a;\n    color: white;\n    padding: 12px 24px;\n    border-radius: 24px;\n    font-size: 14px;\n    font-weight: 500;\n    z-index: 9999;\n    transition: transform 0.3s ease;\n    white-space: nowrap;\n  }\n  .toast.show { transform: translateX(-50%) translateY(0); }\n\n  .empty-state {\n    text-align: center;\n    padding: 40px;\n    color: var(--text-light);\n    font-size: 14px;\n  }\n  .empty-state .icon { font-size: 40px; margin-bottom: 8px; }\n\n  .info-box {\n    background: var(--section-bg);\n    border-left: 4px solid var(--primary-light);\n    border-radius: 0 8px 8px 0;\n    padding: 10px 14px;\n    font-size: 13px;\n    color: var(--text-light);\n    margin-bottom: 12px;\n  }\n\u003c/style\u003e\n\u003c/head\u003e\n\u003cbody\u003e\n\n\u003cdiv class=\"app-header\"\u003e\n  \u003cdiv class=\"header-top\"\u003e\n    \u003ch1\u003eｦｷ 蜿｣閻疲ｩ溯・繝ｻ譬・､願ｩ穂ｾ｡繧ｷ繧ｹ繝・Β\u003c/h1\u003e\n    \u003cspan class=\"badge\"\u003eVer 1.0\u003c/span\u003e\n  \u003c/div\u003e\n  \u003cdiv class=\"tab-bar\"\u003e\n    \u003cbutton class=\"tab-btn active\" onclick=\"showTab('patient')\"\u003e側 蛻ｩ逕ｨ閠・ュ蝣ｱ\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('oral')\"\u003eｦｷ 蜿｣閻疲ｩ溯・\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('mna')\"\u003e･・MNA-SF\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('summary')\"\u003e投 邱丞粋隧穂ｾ｡\u003c/button\u003e\n    \u003cbutton class=\"tab-btn\" onclick=\"showTab('history')\"\u003e搭 險倬鹸荳隕ｧ\u003c/button\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 1: 蛻ｩ逕ｨ閠・ュ蝣ｱ ==================== --\u003e\n\u003cdiv id=\"tab-patient\" class=\"tab-content active\"\u003e\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#eef4fa\"\u003e側\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e蛻ｩ逕ｨ閠・渕譛ｬ諠・ｱ\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003eBasic Patient Information\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e縺ｵ繧翫′縺ｪ\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"furigana\" placeholder=\"繧・∪縺 縺溘ｍ縺・"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e豌丞錐\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"name\" placeholder=\"螻ｱ逕ｰ 螟ｪ驛蚕"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e諤ｧ蛻･\u003c/label\u003e\n        \u003cselect id=\"gender\"\u003e\n          \u003coption value=\"\"\u003e驕ｸ謚杤u003c/option\u003e\n          \u003coption value=\"逕ｷ\"\u003e逕ｷ\u003c/option\u003e\n          \u003coption value=\"螂ｳ\"\u003e螂ｳ\u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e逕溷ｹｴ譛域律・郁･ｿ證ｦ・噂u003c/label\u003e\n        \u003cinput type=\"date\" id=\"birthdate\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e菴馴㍾ (kg)\u003c/label\u003e\n        \u003cinput type=\"number\" id=\"weight\" step=\"0.1\" placeholder=\"55.0\" oninput=\"calcBMI()\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e霄ｫ髟ｷ (cm)\u003c/label\u003e\n        \u003cinput type=\"number\" id=\"height\" step=\"0.1\" placeholder=\"160.0\" oninput=\"calcBMI()\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003eBMI・郁・蜍戊ｨ育ｮ暦ｼ噂u003c/label\u003e\n        \u003cinput type=\"text\" id=\"bmi\" readonly style=\"background:#f0f4f8;font-weight:700;\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e隧穂ｾ｡譌･\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"evalDate\"\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e繧ｵ繝ｼ繝薙せ縺ｮ險ｪ蝠城幕蟋区律\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"serviceStart\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e繧ｵ繝ｼ繝薙せ縺ｮ險ｪ蝠冗ｵゆｺ・律\u003c/label\u003e\n        \u003cinput type=\"date\" id=\"serviceEnd\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e縺九°繧翫▽縺第ｭｯ遘大現\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"dentist\" placeholder=\"笳銀雷豁ｯ遘代け繝ｪ繝九ャ繧ｯ\"\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group\"\u003e\n        \u003clabel\u003e蜈･繧梧ｭｯ縺ｮ菴ｿ逕ｨ\u003c/label\u003e\n        \u003cselect id=\"denture\"\u003e\n          \u003coption value=\"\"\u003e驕ｸ謚杤u003c/option\u003e\n          \u003coption value=\"縺ゅｊ\"\u003e縺ゅｊ\u003c/option\u003e\n          \u003coption value=\"縺ｪ縺予"\u003e縺ｪ縺予u003c/option\u003e\n        \u003c/select\u003e\n      \u003c/div\u003e\n      \u003cdiv class=\"form-group full\"\u003e\n        \u003clabel\u003e諡・ｽ楢・錐\u003c/label\u003e\n        \u003cinput type=\"text\" id=\"staff\" placeholder=\"諡・ｽ薙せ繧ｿ繝・ヵ蜷構"\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"action-bar no-print\"\u003e\n      \u003cbutton class=\"btn btn-primary\" onclick=\"showTab('oral')\"\u003e谺｡縺ｸ・壼哨閻疲ｩ溯・隧穂ｾ｡ 竊箪u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 2: 蜿｣閻疲ｩ溯・ ==================== --\u003e\n\u003cdiv id=\"tab-oral\" class=\"tab-content\"\u003e\n\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#eef4fa\"\u003e搭\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e1. 雉ｪ蝠上→隕ｳ蟇滂ｼ亥挨邏・・噂u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003e蝠剰ｨｺ鬆・岼繝ｻ隕ｳ蟇滄・岼\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"info-box\"\u003e螳滓命譛滄俣荳ｭ縺ｫ縺上∪縺ｪ縺・蝗櫁ｨ伜・縲りｩ穂ｾ｡鬆・岼縺ｫ豐ｿ縺｣縺ｦ蝗樒ｭ斐＠縺ｦ縺上□縺輔＞縲・u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e竭 蝠剰ｨｺ鬆・岼\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:10px\"\u003e\n u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#fff8e8\"\u003e投\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e邱丞粋隧穂ｾ｡繧ｵ繝槭Μ繝ｼ\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003e蜿｣閻疲ｩ溯・ + 譬・､顔憾諷欺u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdiv id=\"summary_name\" style=\"font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px\"\u003e窶表u003c/div\u003e\n    \u003cdiv id=\"summary_date\" style=\"font-size:13px;color:var(--text-light);margin-bottom:16px\"\u003e隧穂ｾ｡譌･・壺表u003c/div\u003e\n\n    \u003cdiv class=\"form-grid\"\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"section-label\"\u003eｦｷ 蜿｣閻疲ｩ溯・隧穂ｾ｡\u003c/p\u003e\n        \u003cdiv id=\"oral_summary_box\" class=\"score-display score-neutral\" style=\"padding:16px\"\u003e\n          \u003cdiv style=\"font-size:14px;font-weight:500\" id=\"oral_summary_text\"\u003e蜿｣閻疲ｩ溯・繧ｿ繝悶ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n      \u003cdiv\u003e\n        \u003cp class=\"section-label\"\u003e･・MNA-SF 繧ｹ繧ｳ繧｢\u003c/p\u003e\n        \u003cdiv id=\"mna_summary_box\" class=\"score-display score-neutral\" style=\"padding:16px\"\u003e\n          \u003cdiv class=\"score-number\" id=\"mna_summary_num\"\u003e窶表u003c/div\u003e\n          \u003cdiv id=\"mna_summary_result\" style=\"font-size:14px;font-weight:700;margin-top:4px\"\u003eMNA繧ｿ繝悶ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞\u003c/div\u003e\n        \u003c/div\u003e\n      \u003c/div\u003e\n    \u003c/div\u003e\n\n    \u003cdiv class=\"divider\"\u003e\u003c/div\u003e\n\n    \u003cp class=\"section-label\"\u003e繧ｳ繝｡繝ｳ繝医・謖・ｰ主・螳ｹ\u003c/p\u003e\n    \u003cdiv class=\"form-group\" style=\"margin-bottom:12px\"\u003e\n      \u003clabel\u003e謾ｯ謠ｴ縺ｮ譁ｹ蜷第ｧ繝ｻ繧ｳ繝｡繝ｳ繝・u003c/label\u003e\n      \u003ctextarea id=\"summary_comment\" placeholder=\"萓具ｼ壼哨閻疲ｸ・祉迥ｶ諷玖憶螂ｽ縲・NA繧ｹ繧ｳ繧｢縺ｫ繧医ｊ菴取・､翫・繝ｪ繧ｹ繧ｯ縺ゅｊ縲よ・､雁｣ｫ縺ｸ縺ｮ騾｣謳ｺ繧呈､懆ｨ弱・" style=\"min-height:100px\"\u003e\u003c/textarea\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"form-group\"\u003e\n      \u003clabel\u003e谺｡蝗槭Δ繝九ち繝ｪ繝ｳ繧ｰ莠亥ｮ壽律\u003c/label\u003e\n      \u003cinput type=\"date\" id=\"next_monitor\"\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\n  \u003cdiv class=\"card no-print\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#fff8e8\"\u003e沈\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e菫晏ｭ倥・蜃ｺ蜉媾u003c/h2\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv class=\"action-bar\"\u003e\n      \u003cbutton class=\"btn btn-success\" onclick=\"saveRecord()\"\u003e沈 險倬鹸繧剃ｿ晏ｭ禄u003c/button\u003e\n      \u003cbutton class=\"btn btn-accent\" onclick=\"printRecord()\"\u003e蜜・・蜊ｰ蛻ｷ / PDF蜃ｺ蜉媾u003c/button\u003e\n      \u003cbutton class=\"btn btn-outline\" onclick=\"clearAll()\"\u003e売 譁ｰ隕丞・蜉媾u003c/button\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- ==================== TAB 5: 險倬鹸荳隕ｧ ==================== --\u003e\n\u003cdiv id=\"tab-history\" class=\"tab-content\"\u003e\n  \u003cdiv class=\"card\"\u003e\n    \u003cdiv class=\"card-header\"\u003e\n      \u003cdiv class=\"icon\" style=\"background:#f0f4f8\"\u003e搭\u003c/div\u003e\n      \u003cdiv\u003e\u003ch2\u003e菫晏ｭ俶ｸ医∩險倬鹸荳隕ｧ\u003c/h2\u003e\u003cdiv class=\"subtitle\"\u003eSaved Assessment Records\u003c/div\u003e\u003c/div\u003e\n    \u003c/div\u003e\n    \u003cdiv style=\"overflow-x:auto\"\u003e\n      \u003ctable class=\"history-table\" id=\"historyTable\"\u003e\n        \u003cthead\u003e\n          \u003ctr\u003e\n            \u003cth\u003e隧穂ｾ｡譌･\u003c/th\u003e\n            \u003cth\u003e豌丞錐\u003c/th\u003e\n            \u003cth\u003eMNA Score\u003c/th\u003e\n            \u003cth\u003e譬・､雁愛螳喀u003c/th\u003e\n            \u003cth\u003e蜿｣閻皮ｶ咏ｶ喀u003c/th\u003e\n            \u003cth\u003e謫堺ｽ彌u003c/th\u003e\n          \u003c/tr\u003e\n        \u003c/thead\u003e\n        \u003ctbody id=\"historyBody\"\u003e\n          \u003ctr\u003e\u003ctd colspan=\"6\"\u003e\u003cdiv class=\"empty-state\"\u003e\u003cdiv class=\"icon\"\u003e唐\u003c/div\u003e菫晏ｭ倥＆繧後◆險倬鹸縺ｯ縺ゅｊ縺ｾ縺帙ｓ\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e\n        \u003c/tbody\u003e\n      \u003c/table\u003e\n    \u003c/div\u003e\n  \u003c/div\u003e\n\u003c/div\u003e\n\n\u003c!-- TOAST --\u003e\n\u003cdiv class=\"toast\" id=\"toast\"\u003e\u003c/div\u003e\n\n\u003cscript\u003e\n// ==================== STATE ====================\nlet mnaScores = { a: null, b: null, c: null, d: null, e: null, f: null };\nlet records = JSON.parse(localStorage.getItem('oralNutritionRecords') || '[]');\n\n// ==================== TABS ====================\nfunction showTab(id) {\n  document.querySelectorAll('.tab-content').forEach(t =\u003e t.classList.remove('active'));\n  document.querySelectorAll('.tab-btn').forEach(b =\u003e b.classList.remove('active'));\n  document.getElementById('tab-' + id).classList.add('active');\n  document.querySelectorAll('.tab-btn').forEach((b, i) =\u003e {\n    const ids = ['patient','oral','mna','summary','history'];\n    if (ids[i] === id) b.classList.add('active');\n  });\n  if (id === 'summary') updateSummary();\n}\n\n// ==================== BMI ====================\nfunction calcBMI() {\n  const w = parseFloat(document.getElementById('weight').value);\n  const h = parseFloat(document.getElementById('height').value);\n  if (w \u0026\u0026 h \u0026\u0026 h \u003e 0) {\n    const bmi = (w / ((h / 100) ** 2)).toFixed(1);\n    document.getElementById('bmi').value = bmi;\n    // Auto-suggest F1\n    autoBMI(parseFloat(bmi));\n  } else {\n    document.getElementById('bmi').value = '';\n  }\n}\n\nfunction autoBMI(bmi) {\n  let score = 0;\n  if (bmi \u003c 19) score = 0;\n  else if (bmi \u003c 21) score = 1;\n  else if (bmi \u003c 23) score = 2;\n  else score = 3;\n  // visually pre-select\n}\n\n// ==================== MNA ====================\nfunction selectMNA(key, value, el) {\n  // Clear selection in group\n  const grpId = key === 'f2' ? 'mna_f1_group' : (key === 'f1' ? 'mna_f1_group' : 'mna_' + key + '_group');\n  if (key === 'f1' || key === 'f2') {\n    document.querySelectorAll('#mna_f1_group .radio-option, #mna_f2_group .radio-option').forEach(o =\u003e o.classList.remove('selected'));\n  } else {\n    document.querySelectorAll('#mna_' + key + '_group .radio-option').forEach(o =\u003e o.classList.remove('selected'));\n  }\n  el.classList.add('selected');\n  mnaScores[key === 'f2' ? 'f' : key] = value;\n  calcMNAScore();\n}\n\nfunction calcMNAScore() {\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  if (vals.some(v =\u003e v === null)) {\n    document.getElementById('mna_score_num').textContent = '窶・;\n    document.getElementById('mna_score_result').textContent = '蜈ｨ鬆・岼縺ｫ蝗樒ｭ斐＠縺ｦ縺上□縺輔＞';\n    return;\n  }\n  const total = vals.reduce((s, v) =\u003e s + v, 0);\n  const numEl = document.getElementById('mna_score_num');\n  const resEl = document.getElementById('mna_score_result');\n  const boxEl = document.getElementById('mna_score_display');\n  numEl.textContent = total;\n  boxEl.className = 'score-display';\n  if (total \u003e= 12) {\n    resEl.textContent = '笨・譬・､顔憾諷玖憶螂ｽ・・2縲・4轤ｹ・・;\n    boxEl.classList.add('score-good');\n  } else if (total \u003e= 8) {\n    resEl.textContent = '笞・・菴取・､翫・縺翫◎繧後≠繧・- At risk・・縲・1轤ｹ・・;\n    boxEl.classList.add('score-risk');\n  } else {\n    resEl.textContent = '笶・菴取・､奇ｼ・縲・轤ｹ・・;\n    boxEl.classList.add('score-bad');\n  }\n}\n\n// ==================== SUMMARY ====================\nfunction updateSummary() {\n  const name = document.getElementById('name').value || '窶・;\n  const date = document.getElementById('evalDate').value || '窶・;\n  document.getElementById('summary_name').textContent = name;\n  document.getElementById('summary_date').textContent = '隧穂ｾ｡譌･・・ + date;\n\n  // Oral\n  const oral2 = document.getElementById('oral_eval2').value;\n  const oralBox = document.getElementById('oral_summary_box');\n  const oralText = document.getElementById('oral_summary_text');\n  oralBox.className = 'score-display';\n  if (oral2.includes('邯咏ｶ・)) {\n    oralText.textContent = '邯咏ｶ壹′蠢・ｦ・;\n    oralBox.classList.add('score-risk');\n  } else if (oral2.includes('邨ゆｺ・)) {\n    oralText.textContent = '繧ｵ繝ｼ繝薙せ邨ゆｺ・;\n    oralBox.classList.add('score-good');\n  } else {\n    oralText.textContent = '蜿｣閻疲ｩ溯・繧ｿ繝悶ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞';\n    oralBox.classList.add('score-neutral');\n  }\n\n  // MNA\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  const mnaBox = document.getElementById('mna_summary_box');\n  const mnaNum = document.getElementById('mna_summary_num');\n  const mnaRes = document.getElementById('mna_summary_result');\n  mnaBox.className = 'score-display';\n  if (vals.some(v =\u003e v === null)) {\n    mnaNum.textContent = '窶・;\n    mnaRes.textContent = 'MNA繧ｿ繝悶ｒ蜈･蜉帙＠縺ｦ縺上□縺輔＞';\n    mnaBox.classList.add('score-neutral');\n  } else {\n    const total = vals.reduce((s, v) =\u003e s + v, 0);\n    mnaNum.textContent = total + ' / 14';\n    if (total \u003e= 12) { mnaRes.textContent = '笨・譬・､顔憾諷玖憶螂ｽ'; mnaBox.classList.add('score-good'); }\n    else if (total \u003e= 8) { mnaRes.textContent = '笞・・菴取・､翫・縺翫◎繧後≠繧・; mnaBox.classList.add('score-risk'); }\n    else { mnaRes.textContent = '笶・菴取・､・; mnaBox.classList.add('score-bad'); }\n  }\n}\n\n// ==================== SAVE ====================\nfunction saveRecord() {\n  const name = document.getElementById('name').value;\n  if (!name) { showToast('笞・・豌丞錐繧貞・蜉帙＠縺ｦ縺上□縺輔＞'); return; }\n  const date = document.getElementById('evalDate').value || new Date().toISOString().split('T')[0];\n  const { a, b, c, d, e, f } = mnaScores;\n  const vals = [a, b, c, d, e, f];\n  const mnaTotal = vals.some(v =\u003e v === null) ? null : vals.reduce((s, v) =\u003e s + v, 0);\n  let mnaLabel = mnaTotal === null ? '窶・ : mnaTotal \u003e= 12 ? '濶ｯ螂ｽ' : mnaTotal \u003e= 8 ? 'At risk' : '菴取・､・;\n\n  const record = {\n    id: Date.now(),\n    date,\n    name,\n    furigana: document.getElementById('furigana').value,\n    mnaScore: mnaTotal,\n    mnaLabel,\n    oralContinue: document.getElementById('oral_eval2').value,\n    comment: document.getElementById('summary_comment').value,\n    nextMonitor: document.getElementById('next_monitor').value,\n    weight: document.getElementById('weight').value,\n    height: document.getElementById('height').value,\n    bmi: document.getElementById('bmi').value,\n    mnaScores: { ...mnaScores }\n  };\n\n  records.unshift(record);\n  localStorage.setItem('oralNutritionRecords', JSON.stringify(records));\n  renderHistory();\n  showToast('沈 險倬鹸繧剃ｿ晏ｭ倥＠縺ｾ縺励◆');\n}\n\n// ==================== HISTORY ====================\nfunction renderHistory() {\n  const tbody = document.getElementById('historyBody');\n  if (records.length === 0) {\n    tbody.innerHTML = '\u003ctr\u003e\u003ctd colspan=\"6\"\u003e\u003cdiv class=\"empty-state\"\u003e\u003cdiv class=\"icon\"\u003e唐\u003c/div\u003e菫晏ｭ倥＆繧後◆險倬鹸縺ｯ縺ゅｊ縺ｾ縺帙ｓ\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e';\n    return;\n  }\n  tbody.innerHTML = records.map(r =\u003e {\n    const tagClass = r.mnaLabel === '濶ｯ螂ｽ' ? 'tag-good' : r.mnaLabel === 'At risk' ? 'tag-risk' : r.mnaLabel === '菴取・､・ ? 'tag-bad' : '';\n    const oralClass = r.oralContinue \u0026\u0026 r.oralContinue.includes('邯咏ｶ・) ? 'tag-risk' : r.oralContinue \u0026\u0026 r.oralContinue.includes('邨ゆｺ・) ? 'tag-good' : '';\n    return `\u003ctr\u003e\n      \u003ctd\u003e${r.date}\u003c/td\u003e\n      \u003ctd\u003e\u003cstrong\u003e${r.name}\u003c/strong\u003e\u003cbr\u003e\u003csmall style=\"color:var(--text-light)\"\u003e${r.furigana||''}\u003c/small\u003e\u003c/td\u003e\n      \u003ctd\u003e\u003cstrong\u003e${r.mnaScore !== null ? r.mnaScore + '/14' : '窶・}\u003c/strong\u003e\u003c/td\u003e\n      \u003ctd\u003e\u003cspan class=\"tag ${tagClass}\"\u003e${r.mnaLabel}\u003c/span\u003e\u003c/td\u003e\n      \u003ctd\u003e\u003cspan class=\"tag ${oralClass}\"\u003e${r.oralContinue || '窶・}\u003c/span\u003e\u003c/td\u003e\n      \u003ctd\u003e\n        \u003cbutton class=\"btn btn-outline btn-sm\" onclick=\"loadRecord(${r.id})\"\u003e隱ｭ霎ｼ\u003c/button\u003e\n        \u003cbutton class=\"btn btn-danger btn-sm\" style=\"margin-left:4px\" onclick=\"deleteRecord(${r.id})\"\u003e蜑企勁\u003c/button\u003e\n      \u003c/td\u003e\n    \u003c/tr\u003e`;\n  }).join('');\n}\n\nfunction loadRecord(id) {\n  const r = records.find(rec =\u003e rec.id === id);\n  if (!r) return;\n  document.getElementById('name').value = r.name || '';\n  document.getElementById('furigana').value = r.furigana || '';\n  document.getElementById('evalDate').value = r.date || '';\n  document.getElementById('weight').value = r.weight || '';\n  document.getElementById('height').value = r.height || '';\n  document.getElementById('bmi').value = r.bmi || '';\n  document.getElementById('summary_comment').value = r.comment || '';\n  document.getElementById('next_monitor').value = r.nextMonitor || '';\n  if (r.mnaScores) {\n    mnaScores = { ...r.mnaScores };\n    // Re-render MNA selections\n    ['a','b','c','d','e'].forEach(k =\u003e {\n      if (mnaScores[k] !== null) {\n        document.querySelectorAll(`input[name=\"mna_${k}\"]`).forEach(inp =\u003e {\n          if (parseInt(inp.value) === mnaScores[k]) {\n            inp.checked = true;\n            inp.closest('.radio-option').classList.add('selected');\n          }\n        });\n      }\n    });\n    calcMNAScore();\n  }\n  showTab('patient');\n  showToast('唐 險倬鹸繧定ｪｭ縺ｿ霎ｼ縺ｿ縺ｾ縺励◆');\n}\n\nfunction deleteRecord(id) {\n  if (!confirm('縺薙・險倬鹸繧貞炎髯､縺励∪縺吶°・・)) return;\n  records = records.filter(r =\u003e r.id !== id);\n  localStorage.setItem('oralNutritionRecords', JSON.stringify(records));\n  renderHistory();\n  showToast('卵・・險倬鹸繧貞炎髯､縺励∪縺励◆');\n}\n\n// ==================== CLEAR ====================\nfunction clearAll() {\n  if (!confirm('蜈･蜉帛・螳ｹ繧偵☆縺ｹ縺ｦ繧ｯ繝ｪ繧｢縺励∪縺吶°・・)) return;\n  document.querySelectorAll('input[type=\"text\"], input[type=\"number\"], input[type=\"date\"]').forEach(i =\u003e i.value = '');\n  document.querySelectorAll('select').forEach(s =\u003e s.selectedIndex = 0);\n  document.querySelectorAll('textarea').forEach(t =\u003e t.value = '');\n  document.querySelectorAll('.radio-option').forEach(o =\u003e o.classList.remove('selected'));\n  document.querySelectorAll('input[type=\"radio\"]').forEach(r =\u003e r.checked = false);\n  mnaScores = { a: null, b: null, c: null, d: null, e: null, f: null };\n  document.getElementById('mna_score_num').textContent = '窶・;\n  document.getElementById('mna_score_result').textContent = '蝗樒ｭ斐ｒ驕ｸ謚槭＠縺ｦ縺上□縺輔＞';\n  document.getElementById('mna_score_display').className = 'score-display score-neutral';\n  showTab('patient');\n  showToast('売 繧ｯ繝ｪ繧｢縺励∪縺励◆');\n}\n\n// ==================== PRINT ====================\nfunction printRecord() {\n  updateSummary();\n  // Show all tabs for print\n  document.querySelectorAll('.tab-content').forEach(t =\u003e t.style.display = 'block');\n  window.print();\n  document.querySelectorAll('.tab-content').forEach(t =\u003e t.style.display = '');\n  document.querySelector('.tab-content.active').style.display = 'block';\n}\n\n// ==================== TOAST ====================\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  setTimeout(() =\u003e t.classList.remove('show'), 2500);\n}\n\n// ==================== INIT ====================\ndocument.getElementById('evalDate').value = new Date().toISOString().split('T')[0];\nrenderHistory();\n\u003c/script\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n"])</script><script nonce="JvPBpJJ2RmOOViQLW3isEA==">self.__next_f.push([1,"6:[\"$\",\"$L1a\",null,{\"artifact\":{\"title\":\"oral-nutrition-assessment.html\",\"language\":\"$undefined\",\"type\":\"text/html\",\"content\":\"$1b\",\"description\":\"鬮倬ｽ｢閠・髄縺大哨閻疲ｩ溯・縺ｨ譬・､顔憾諷九ｒ邱丞粋隧穂ｾ｡縺吶ｋWeb繧｢繝励Μ縲・NA-SF縲ヽSST縲√が繝ｼ繝ｩ繝ｫ繧ｸ繧ｹ繧ｭ繝阪ず繧｢縺ｪ縺ｩ蟆る摩逧・い繧ｻ繧ｹ繝｡繝ｳ繝磯・岼繧呈政霈峨りｨ倬鹸菫晏ｭ倥・蜊ｰ蛻ｷ讖溯・莉倥″縲・",\"content_score\":7,\"seo_
